# DEV: Frontend por HTTPS (Nginx) con proxy /api → backend-dev (HTTPS 8444)
services:
  backend-dev:
    # Solo lo referenciamos para depends_on; su configuración HTTPS está en
    # docker-compose.dev-backend-https.yml
    profiles: ["dev"]

  frontend-dev-https:
    profiles: ["dev"]
    container_name: pmbok_frontend_dev_https
    depends_on:
      backend-dev:
        # Este healthcheck lo aporta el override del backend HTTPS
        condition: service_healthy
    build:
      context: ./frontend
      dockerfile: Dockerfile.staging
      args:
        # El frontend hará fetch a /api en el MISMO origen https://localhost:9443
        VITE_API_URL: https://localhost:9443/api
    ports:
      - "9443:443"
    volumes:
      - ./frontend/nginx.https.dev.conf:/etc/nginx/conf.d/default.conf:ro,Z
      - ./certs:/etc/nginx/certs:ro,Z
    restart: unless-stopped
