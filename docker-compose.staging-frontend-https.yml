# STAGING: Frontend por HTTPS (8443) con proxy /api → backend-staging:8000
services:
  backend-staging:
    ports: [] # asegura que NO se exponga el backend cuando usamos el frontend TLS
  frontend-staging:
    depends_on:
      backend-staging:
        condition: service_started
    ports:
      - "8443:443"
    volumes:
      - ./frontend/nginx.https.staging.conf:/etc/nginx/conf.d/default.conf:ro,Z
      - ./certs:/etc/nginx/certs:ro,Z
    build:
      args:
        VITE_API_URL: https://localhost:8443/api
    restart: unless-stopped
